version: 2

sources:
  - name: raw
    schema: main
    tables:
      - name: raw_transactions
        description: "Raw synthetic financial transactions generated by generate_data.py"
        columns:
          - name: transaction_id
            description: "Unique transaction identifier"
            tests:
              - unique
              - not_null
          - name: date
            tests:
              - not_null
          - name: amount
            tests:
              - not_null
